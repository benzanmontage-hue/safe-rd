name: saferd
description: SafeRD — Dominican Republic Road Safety App. Real-time incident reporting, SOS alerts, live hazard map.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_messaging: ^15.0.0
  google_maps_flutter: ^2.5.0
  geolocator: ^13.0.0
  flutter_tts: ^4.0.0
  provider: ^6.1.0
  url_launcher: ^6.3.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  connectivity_plus: ^6.0.0
  flutter_local_notifications: ^18.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
